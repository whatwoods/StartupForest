<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#0058bb",
                    "surface-container-low": "#f3f4ed",
                    "on-background": "#191c18",
                    "on-secondary-container": "#fefcff",
                    "error": "#ba1a1a",
                    "surface": "#f9faf2",
                    "surface-bright": "#f9faf2",
                    "primary-fixed-dim": "#a1d494",
                    "inverse-primary": "#a1d494",
                    "secondary-fixed-dim": "#adc7ff",
                    "on-primary-fixed-variant": "#23501e",
                    "outline-variant": "#c2c9bb",
                    "secondary-fixed": "#d8e2ff",
                    "surface-container-highest": "#e2e3dc",
                    "background": "#f9faf2",
                    "on-tertiary-container": "#ffb17d",
                    "surface-dim": "#d9dbd3",
                    "inverse-surface": "#2e312c",
                    "on-surface-variant": "#42493e",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#311300",
                    "tertiary-fixed-dim": "#ffb786",
                    "surface-variant": "#e2e3dc",
                    "primary": "#154212",
                    "inverse-on-surface": "#f0f1ea",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#001a41",
                    "tertiary-fixed": "#ffdcc6",
                    "secondary-container": "#1471e6",
                    "primary-fixed": "#bcf0ae",
                    "on-primary-fixed": "#002201",
                    "on-tertiary-fixed-variant": "#723600",
                    "surface-tint": "#3b6934",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#9dd090",
                    "outline": "#72796e",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#2d5a27",
                    "on-secondary-fixed-variant": "#004493",
                    "surface-container-high": "#e7e9e1",
                    "on-error": "#ffffff",
                    "tertiary": "#5e2b00",
                    "tertiary-container": "#803e00",
                    "on-surface": "#191c18",
                    "surface-container": "#edefe7",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>body {
    font-family: "Plus Jakarta Sans", sans-serif
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.custom-noise {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCT6osZVB9X9L1RbP7quJqctx5ZCZEu37463yLd9jZbi7FfILtqQic8lHPTjl0bb16FQmVpC0UFfAu4xbOadUNLTyDbPFpwzFRFNi3LVZjf9W6z-Y_Juk3M4F60YEACRHUDdnpGsa3xB8XKD0xu394tW4rxC1zVCuwMO2_yYDYNsLsFXm2c9zPXh2o07JHV2tRr1JFd-kmPtnkgca5E0qLj3kxCUBNLSco7OaaCYdpRWhp_8lYem2T67nU7GLpI0jDbw2XvnYL6RU8);
    opacity: 0.02;
    pointer-events: none
    }
.glass-panel {
    background: rgba(249, 250, 242, 0.7);
    backdrop-filter: blur(24px)
    }</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex overflow-hidden">
<div class="fixed inset-0 custom-noise z-0"></div>
<!-- Sidebar Navigation -->
<aside class="w-72 bg-primary text-white flex-col hidden md:flex z-10">
<div class="p-8">
<div class="text-2xl font-bold tracking-tighter text-white">创业森林</div>
<div class="mt-2 text-xs font-label tracking-widest text-primary-fixed-dim uppercase">Admin Console</div>
</div>
<nav class="flex-1 px-4 space-y-2 mt-4">
<a class="flex items-center gap-3 px-4 py-3 text-white/60 hover:text-white transition-colors duration-300" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-medium">仪表盘</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 bg-primary-container text-white rounded-lg shadow-sm" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">event</span>
<span class="font-semibold">活动管理</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-white/60 hover:text-white transition-colors duration-300" href="#">
<span class="material-symbols-outlined">group</span>
<span class="font-medium">参与者</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-white/60 hover:text-white transition-colors duration-300" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="font-medium">财务结算</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-white/60 hover:text-white transition-colors duration-300" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-medium">设置</span>
</a>
</nav>
<div class="p-6 border-t border-white/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed-dim flex items-center justify-center text-primary font-bold">Z</div>
<div>
<div class="text-sm font-semibold">Zhang Organizer</div>
<div class="text-xs text-white/50 italic">高级认证组织者</div>
</div>
</div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="flex-1 relative overflow-y-auto z-10">
<!-- Top Bar -->
<header class="h-20 flex justify-between items-center px-10 glass-panel sticky top-0 z-20">
<div class="flex items-center gap-4">
<h1 class="text-xl font-bold text-primary">创建新活动</h1>
<span class="text-outline-variant">/</span>
<span class="text-on-surface-variant text-sm">发布您的下一个增长动力</span>
</div>
<div class="flex items-center gap-6">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="h-8 w-px bg-outline-variant/30"></div>
<button class="text-sm font-medium text-secondary hover:underline underline-offset-4 transition-all">预览活动页面</button>
</div>
</header>
<div class="max-w-4xl mx-auto py-12 px-8 space-y-12">
<!-- Section 1: Basic Info -->
<section class="space-y-6">
<div class="flex items-baseline gap-4 border-b border-outline-variant/10 pb-4">
<span class="text-4xl font-black text-primary/10">01</span>
<h2 class="text-2xl font-bold tracking-tight text-primary">活动基本信息</h2>
</div>
<div class="grid grid-cols-1 gap-8">
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">活动主题</label>
<input class="w-full bg-surface-container-high border-none rounded-none border-b-2 border-transparent focus:border-primary focus:ring-0 transition-all text-xl font-semibold py-4" placeholder="输入引人注目的标题..." type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">开始时间</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">calendar_today</span>
<input class="w-full bg-surface-container-low border-none rounded-lg pl-10 focus:ring-2 focus:ring-primary/20" type="datetime-local"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">活动地点</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">location_on</span>
<input class="w-full bg-surface-container-low border-none rounded-lg pl-10 focus:ring-2 focus:ring-primary/20" placeholder="城市、场地或远程链接" type="text"/>
</div>
</div>
</div>
<div class="space-y-4">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">活动详情介绍</label>
<div class="rounded-xl border border-outline-variant/20 overflow-hidden bg-surface-container-lowest">
<div class="flex gap-2 p-3 border-b border-outline-variant/10 bg-surface-container-low/30">
<button class="p-1.5 hover:bg-white rounded transition-colors"><span class="material-symbols-outlined text-sm">format_bold</span></button>
<button class="p-1.5 hover:bg-white rounded transition-colors"><span class="material-symbols-outlined text-sm">format_italic</span></button>
<button class="p-1.5 hover:bg-white rounded transition-colors"><span class="material-symbols-outlined text-sm">image</span></button>
<button class="p-1.5 hover:bg-white rounded transition-colors"><span class="material-symbols-outlined text-sm">link</span></button>
</div>
<textarea class="w-full border-none focus:ring-0 p-6 text-on-surface-variant leading-relaxed" placeholder="分享活动的愿景、议程和亮点..." rows="6"></textarea>
</div>
</div>
</div>
</section>
<!-- Section 2: Tickets -->
<section class="space-y-6">
<div class="flex items-baseline gap-4 border-b border-outline-variant/10 pb-4">
<span class="text-4xl font-black text-primary/10">02</span>
<h2 class="text-2xl font-bold tracking-tight text-primary">票种与容量</h2>
</div>
<div class="space-y-4">
<!-- Dynamic Ticket List -->
<div class="grid grid-cols-12 gap-4 items-center bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/10">
<div class="col-span-6 space-y-1">
<label class="text-[10px] font-label text-outline uppercase tracking-tighter">票种名称</label>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 font-medium" type="text" value="早鸟票 (Early Bird)"/>
</div>
<div class="col-span-3 space-y-1">
<label class="text-[10px] font-label text-outline uppercase tracking-tighter">名额数量</label>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 font-medium" type="number" value="50"/>
</div>
<div class="col-span-2 space-y-1">
<label class="text-[10px] font-label text-outline uppercase tracking-tighter">价格</label>
<div class="flex items-center gap-1">
<span class="text-xs">¥</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 font-medium" type="number" value="0"/>
</div>
</div>
<div class="col-span-1 flex justify-end">
<button class="text-error opacity-40 hover:opacity-100 transition-opacity"><span class="material-symbols-outlined">delete</span></button>
</div>
</div>
<div class="grid grid-cols-12 gap-4 items-center bg-surface-container-low/30 p-6 rounded-xl border border-dashed border-outline-variant/30">
<div class="col-span-6 space-y-1">
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-sm" placeholder="输入新票种名称..." type="text"/>
</div>
<div class="col-span-3">
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-sm" placeholder="数量" type="number"/>
</div>
<div class="col-span-3 flex justify-end">
<button class="flex items-center gap-2 px-4 py-2 bg-primary-fixed text-on-primary-fixed rounded-full text-xs font-bold hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-sm">add</span>
                                添加票种
                            </button>
</div>
</div>
</div>
</section>
<!-- Section 3: Rules -->
<section class="space-y-6">
<div class="flex items-baseline gap-4 border-b border-outline-variant/10 pb-4">
<span class="text-4xl font-black text-primary/10">03</span>
<h2 class="text-2xl font-bold tracking-tight text-primary">审核与规则设置</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Approval Mode -->
<div class="bg-surface-container-low rounded-xl p-8 space-y-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">verified_user</span>
<h3 class="font-bold text-primary">报名审核方式</h3>
</div>
<div class="space-y-4">
<label class="flex items-start gap-4 p-4 rounded-lg bg-surface-container-lowest cursor-pointer group hover:bg-primary-fixed/20 transition-colors">
<input checked="" class="mt-1 text-primary focus:ring-primary" name="approval" type="radio"/>
<div>
<div class="font-bold">手动审核</div>
<div class="text-xs text-on-surface-variant">组织者需逐一确认申请人，确保参与者质量。</div>
</div>
</label>
<label class="flex items-start gap-4 p-4 rounded-lg bg-surface-container-lowest cursor-pointer group hover:bg-primary-fixed/20 transition-colors">
<input class="mt-1 text-primary focus:ring-primary" name="approval" type="radio"/>
<div>
<div class="font-bold">先到先得</div>
<div class="text-xs text-on-surface-variant">无需审核，名额满即停止报名。</div>
</div>
</label>
</div>
</div>
<!-- Voting Rules -->
<div class="bg-surface-container-low rounded-xl p-8 space-y-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary">how_to_vote</span>
<h3 class="font-bold text-tertiary">活动投票规则</h3>
</div>
<div class="space-y-4">
<div class="flex items-center justify-between">
<span class="text-sm font-medium">启用现场投票</span>
<div class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary-fixed">
<span class="translate-x-6 inline-block h-4 w-4 transform rounded-full bg-primary transition"></span>
</div>
</div>
<div class="space-y-2 opacity-100">
<label class="text-[10px] font-label uppercase text-on-surface-variant">每人投票次数限制</label>
<select class="w-full bg-surface-container-lowest border-none rounded-lg text-sm">
<option>仅限 1 票</option>
<option>最多 3 票</option>
<option>无限制</option>
</select>
</div>
</div>
</div>
</div>
</section>
</div>
<!-- Sticky Bottom Actions -->
<footer class="sticky bottom-0 w-full glass-panel border-t border-outline-variant/10 p-6 z-30">
<div class="max-w-4xl mx-auto flex items-center justify-between">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm animate-pulse">cloud_done</span>
<span class="text-xs">草稿已于 14:22 自动保存</span>
</div>
<div class="flex items-center gap-4">
<button class="px-8 py-3 rounded-lg text-primary font-bold hover:bg-primary-fixed/30 transition-colors duration-300">
                        保存为草稿
                    </button>
<button class="px-10 py-3 bg-primary text-on-primary rounded-lg font-bold shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all duration-300 flex items-center gap-2">
<span>立即发布活动</span>
<span class="material-symbols-outlined text-sm">rocket_launch</span>
</button>
</div>
</div>
</footer>
</main>
<!-- Decoration Element -->
<div class="fixed top-[15%] right-[-10%] w-[40rem] h-[40rem] bg-primary-fixed/20 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[30rem] h-[30rem] bg-tertiary-fixed/10 rounded-full blur-[80px] -z-10 pointer-events-none"></div>
</body></html>
